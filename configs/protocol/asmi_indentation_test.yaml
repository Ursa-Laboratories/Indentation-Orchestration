# ASMI single-well indentation test (CubOS entrypoint format).
#
# CubOS deck-origin +Z-up. Heights on `measure` are *labware-relative* offsets
# above the well's calibrated surface Z (signed: + above, - below). The well id
# in `position:` is what the controller swaps per iteration.
#
# `indentation_limit_height` is set *close to* `measurement_height`, so the
# indenter only descends a tiny bit and stays above the well surface — a
# low-risk "does the motion + force sensor work?" run, not a real indent.
# For a real indent, drop it to a negative value (e.g. -5.0 = 5 mm into the
# well). cubos requires indentation_limit_height ≤ measurement_height.
#
# Flow: home → measure one well → home  (the final `home` retracts Z then parks
# at the homing corner — no literal park XY to risk the soft limits).

protocol:
  - home:

  - measure:
      instrument: asmi
      position: plate.E5            # well; the controller rewrites this per iteration
      method: indentation
      measurement_height: 2.0       # 2 mm above the well rim (labware-relative)
      indentation_limit_height: 1.5 # close to measurement_height — only ~0.5 mm of descent; stays above the surface
      method_kwargs:
        step_size: 0.01
        force_limit: 10.0
        baseline_samples: 10
        measure_with_return: false

  - home:
